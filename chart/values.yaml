replicaCount: 1

image:
  repository: code-sandbox
  tag: latest
  pullPolicy: IfNotPresent

profile: minimal

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

seccomp:
  enabled: false
  # Override to use a pre-existing SeccompProfile instead of chart-managed.
  # Leave empty to use the chart-generated profile name.
  profileName: ""

networkPolicy:
  enabled: true
  # Override to customize which pods can reach the sandbox.
  # Default: pods with label code-sandbox-client=true.
  # Example: allow from a specific namespace:
  #   ingressFrom:
  #     - namespaceSelector:
  #         matchLabels:
  #           name: my-agent-ns
  ingressFrom: []

service:
  port: 8000

route:
  enabled: false
  host: ""
