apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "code-sandbox.fullname" . }}
  labels:
    {{- include "code-sandbox.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "code-sandbox.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "code-sandbox.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: sandbox
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: SANDBOX_PROFILE
              value: {{ .Values.profile | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            {{- if .Values.seccomp.enabled }}
            seccompProfile:
              type: Localhost
              localhostProfile: operator/{{ include "code-sandbox.fullname" . }}-sandbox.json
            {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 10Mi
