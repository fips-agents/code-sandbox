{{- if .Values.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "code-sandbox.fullname" . }}
  labels:
    {{- include "code-sandbox.labels" . | nindent 4 }}
  annotations:
    haproxy.router.openshift.io/timeout: "60s"
spec:
  {{- if .Values.route.host }}
  host: {{ .Values.route.host }}
  {{- end }}
  to:
    kind: Service
    name: {{ include "code-sandbox.fullname" . }}
    weight: 100
  port:
    targetPort: 8000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
