{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "code-sandbox.fullname" . }}
  labels:
    {{- include "code-sandbox.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "code-sandbox.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- if .Values.networkPolicy.ingressFrom }}
        {{- toYaml .Values.networkPolicy.ingressFrom | nindent 8 }}
        {{- else }}
        # Default: only pods with code-sandbox-client label can connect.
        - podSelector:
            matchLabels:
              code-sandbox-client: "true"
        {{- end }}
      ports:
        - port: 8000
          protocol: TCP
  egress: []
{{- end }}
