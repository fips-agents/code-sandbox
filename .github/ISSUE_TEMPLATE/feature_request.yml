name: Feature request
description: Propose a new capability or enhancement.
title: "<brief description>"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a new feature! Please fill out the fields below so the maintainers can understand the motivation and scope.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's the user or operator pain that this feature addresses?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should we build? High-level is fine -- deep design can come later.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - AST guardrails (guardrails.py)
        - Runtime preamble (executor.py)
        - Profiles system (profiles.py)
        - Landlock LSM (landlock.py)
        - Helm chart (chart/)
        - Pipeline (pipeline.py)
        - API / endpoints (app.py)
        - Documentation
        - CI / build
        - Other
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated and why you rejected them.
    validations:
      required: false
